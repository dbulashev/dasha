name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - name: Install linters
        run: |
          go install github.com/mgechev/revive@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Lint Go
        run: |
          cd backend
          revive -config revive.toml -formatter friendly -exclude ./gen/... ./...
          gosec -quiet -exclude-dir=gen ./...

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint

  test-backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - run: cd backend && go test ./internal/...

  test-backend-integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg-version: [14, 15, 16, 17, 18]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - name: Integration tests (PG ${{ matrix.pg-version }})
        run: |
          cd backend
          POSTGRES_VERSION=${{ matrix.pg-version }} go test -tags=integration -v -timeout=5m ./internal/repository/

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      # - run: cd frontend && npm run test:unit

  build-check:
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, test-backend-unit, test-frontend]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - run: cd backend && go build ./cmd/...
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
