version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      otel:
        patterns:
          - "go.opentelemetry.io/*"
      grpc-protobuf:
        patterns:
          - "google.golang.org/grpc"
          - "google.golang.org/protobuf"
          - "google.golang.org/genproto/*"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      vuetify:
        patterns:
          - "vuetify"
          - "@vuetify/*"
      vue-core:
        patterns:
          - "vue"
          - "vue-router"
          - "pinia"
          - "@vue/*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"

  - package-ecosystem: docker
    directory: /deploy/images
    schedule:
      interval: weekly
