{{- if .Values.mcp.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "dasha.fullname" $ }}-mcp
  namespace: {{ template "dasha.namespace" $ }}
  labels:
    {{- include "dasha.labels" $ | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  replicas: {{ .Values.mcp.replicaCount }}
  selector:
    matchLabels:
      {{- include "dasha.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: mcp
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "dasha.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: mcp
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.mcp.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: mcp
          image: {{ include "dasha.mcpImage" . }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - --http
            - ":{{ .Values.mcp.port }}"
            - --dasha-url
            - {{ include "dasha.mcpDashaURL" . | quote }}
            - --timeout
            - {{ .Values.mcp.timeout | quote }}
          {{- if .Values.mcp.token.existingSecret }}
          env:
            # Optional shared fallback token. HTTP mode normally relies on per-user
            # passthrough (each client sends its own PAT in the Authorization header).
            - name: DASHA_MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mcp.token.existingSecret }}
                  key: {{ .Values.mcp.token.secretKey }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.mcp.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- with .Values.mcp.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
