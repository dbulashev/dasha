{{- if .Values.mcp.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ template "dasha.fullname" $ }}-mcp
  namespace: {{ template "dasha.namespace" $ }}
  labels:
    {{- include "dasha.labels" $ | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  type: {{ .Values.mcp.service.type | default .Values.service.type }}
  ports:
    - port: {{ .Values.mcp.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "dasha.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: mcp
{{- end }}
