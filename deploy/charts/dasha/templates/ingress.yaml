{{- if .Values.ingress.enabled }}
{{- if and .Values.ingress.tls.enabled .Values.ingress.tls.certManager.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ template "dasha.fullname" $ }}-tls
  namespace: {{ .Values.ingress.tls.certNamespace | default (include "dasha.namespace" $) }}
spec:
  dnsNames:
    - {{ .Values.ingress.domain }}
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: {{ .Values.ingress.tls.certManager.issuer }}
  secretName: {{ template "dasha.fullname" $ }}-tls
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ template "dasha.fullname" $ }}-ingress
  namespace: {{ template "dasha.namespace" $ }}
  labels:
    {{- include "dasha.labels" $ | nindent 4 }}
  {{- $annotations := dict }}
  {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.redirect }}
  {{- $_ := set $annotations "nginx.ingress.kubernetes.io/ssl-redirect" "true" }}
  {{- $_ := set $annotations "nginx.ingress.kubernetes.io/force-ssl-redirect" "true" }}
  {{- end }}
  {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.certManager.enabled }}
  {{- $_ := set $annotations "cert-manager.io/cluster-issuer" .Values.ingress.tls.certManager.issuer }}
  {{- end }}
  {{- with .Values.ingress.annotations }}
  {{- $annotations = merge $annotations . }}
  {{- end }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.domain }}
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" (include "dasha.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.domain }}
      http:
        paths:
          {{- if .Values.frontend.enabled }}
          # Frontend nginx handles path-routing internally (/api/, /auth/ → backend, / → SPA).
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ template "dasha.fullname" $ }}-frontend
                port:
                  name: http
          {{- else }}
          # Headless deploy (no UI): route API and auth callbacks directly to backend.
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: {{ template "dasha.fullname" $ }}-backend
                port:
                  name: http
          - path: /auth/
            pathType: Prefix
            backend:
              service:
                name: {{ template "dasha.fullname" $ }}-backend
                port:
                  name: http
          {{- end }}
{{- end }}
