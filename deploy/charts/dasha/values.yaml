replicaCount: 1

images:
  pullPolicy: IfNotPresent
  backend:
    repository: dbulashev/dasha-backend
    tag: ""  # defaults to appVersion
  frontend:
    repository: dbulashev/dasha-frontend
    tag: ""
  mcp:
    repository: dbulashev/dasha-mcp
    tag: ""  # defaults to appVersion

# -- dasha.yaml config rendered as ConfigMap
# Passwords must use password_from_env, never inline
config:
  debug: false
  # pg_stats_view: monitoring.pg_stats  # custom view when user lacks pg_catalog.pg_stats access
  # enable_query_stats_reset: false  # allow resetting pg_stat_statements via UI
  # pgss_reset_function: monitoring.reset_pgss  # SECURITY DEFINER wrapper when the role lacks EXECUTE on pg_stat_statements_reset()

  # -- Yandex Cloud log search limits (page /logs), applies to yandex-mdb clusters
  # log_search:
  #   max_scan: 5000          # max records scanned per search
  #   max_page_size: 1000     # upper bound for page_size
  #   timeout_seconds: 30     # upstream read timeout
  #   rate_limit:             # per user (per IP when anonymous); rps <= 0 disables
  #     requests_per_second: 0.0333  # 1 request per 30s
  #     burst: 10
  #   admin_rate_limit:       # separate limit for the admin role
  #     requests_per_second: 0.2     # 1 request per 5s
  #     burst: 20

  # -- Connection pools to monitored clusters (one pool per host+database).
  # Defaults: max_conns 4, max_conn_idle_time 2m. Behind a per-user connection
  # pooler (Odyssey/PgBouncer) keep (hosts × databases) × max_conns + the
  # autosnapshot pool under the user's pool_size limit; a short idle time returns
  # connections to the pooler between refreshes. Example tightening below the
  # defaults to fit a small per-user pool_size:
  # db_pool:
  #   max_conns: 2
  #   max_conn_idle_time: 30s
  # autosnapshot_db_pool:   # the daemon connects as the same user; per-field override of db_pool
  #   max_conns: 2
  #   max_conn_idle_time: 15s

  # -- Authentication & authorization
  # auth:
  #   mode: none  # none | token | oidc
  #
  #   ## mode: token — static API keys
  #   # tokens:
  #   #   - name: monitoring
  #   #     token_from_env: DASHA_TOKEN_MONITORING
  #   #     role: viewer           # viewer (default) | admin
  #
  #   ## mode: oidc — OpenID Connect (Keycloak, Google, etc.)
  #   # oidc:
  #   #   issuer_url: "https://keycloak.example.com/realms/dasha"
  #   #   client_id: "dasha-app"
  #   #   client_secret_from_env: DASHA_OIDC_SECRET
  #   #   scopes: ["openid", "profile", "email"]
  #   #   redirect_url: "https://dasha.example.com/auth/callback"
  #   #   role_claim: "realm_access.roles"   # or "groups" for corporate LDAP/AD groups
  #   #   role_mapping:                      # map corporate groups to dasha roles (admin/viewer)
  #   #     dba_team: admin
  #   #     team_lead: admin
  #   #     dev_team: viewer
  #   # cookie_secret_from_env: DASHA_COOKIE_SECRET
  #   # cookie_max_age: 86400
  #   # tokens:  # API keys also work in oidc mode
  #   #   - name: monitoring
  #   #     token_from_env: DASHA_TOKEN_MONITORING
  #   # rate_limit:
  #   #   requests_per_second: 10
  #   #   burst: 20

  clusters: []
  #  - name: my-cluster
  #    username: postgres
  #    password_from_env: CLUSTER_MY_CLUSTER_PASSWORD
  #    port: "5432"
  #    databases:
  #      - postgres
  #    hosts:
  #      - pg-host.example.com
  discovery: {}
  #  yandex_mdb_prod:
  #    type: yandex-mdb
  #    config:
  #      authorized_key: /secrets/prod/authorized_key.json
  #      folder_id: "xxx"
  #      user: postgres_monitoring
  #      password_from_env: DISCOVERY_PROD_PASSWORD
  #      refresh_interval: 5
  #      clusters:
  #        - name: ".*"

  # -- Snapshot storage (optional): a PostgreSQL DB for pgss snapshots and Health
  # Score weight overrides. The DB connection can be split into two roles:
  #   dsn           — service role used for all reads/writes (DML); in a hardened
  #                   setup this role has NO privilege to create/alter tables.
  #   dsn_migration — privileged role that runs DDL: migrations and daily
  #                   partition creation. Falls back to dsn when unset.
  # Provide both as *_from_env so credentials come from a Secret, not the ConfigMap.
  # storage:
  #   dsn_from_env: DASHA_STORAGE_DSN                      # service role (DML)
  #   dsn_migration_from_env: DASHA_STORAGE_DSN_MIGRATION  # DDL role (optional)
  #   leader_election: true  # advisory-lock leader election for autosnapshot.replicaCount > 1; needs a direct/session-pooled connection (see the autosnapshot section)
  # Run `dasha migrate` (e.g. a Job / initContainer using the migration role) to
  # create the tables and partitions up front; the long-running service then
  # only needs the DML role. Partition creation at snapshot-write time also uses
  # dsn_migration (falling back to dsn).

  # -- Metrics-backed Health Score (optional)
  # Computes the score, recommendations and a history trend from a
  # Prometheus/VictoriaMetrics-compatible datasource instead of the point-in-time
  # SQL snapshot; falls back to the snapshot when the datasource is unavailable or
  # a target is unmatched. Durations are Go strings (e.g. 10s, 672h).
  # Validate label matching at: GET /api/common/health-score/datasource/status
  # health_score:
  #   metrics:
  #     enabled: true
  #     datasource:
  #       url: "http://victoria-metrics.monitoring.svc:8428"  # VictoriaMetrics / Prometheus base URL
  #       # timeout: 10s
  #       # query_cache_ttl: 30s
  #       # auth:                            # datasource credentials — treat as secret
  #       #   type: bearer                    # none | bearer | basic
  #       #   token_from_env: DASHA_METRICS_DATASOURCE_TOKEN        # bearer: env-injected token
  #       #   # username: monitoring          # basic auth:
  #       #   # password_from_env: DASHA_METRICS_DATASOURCE_PASSWORD
  #       #   # token / password               # inline alternative (avoid — lands in the ConfigMap)
  #       # Provide the env vars via secrets.existingSecret or secrets.externalSecret.data below.
  #
  #     # Which provider feeds each role: core = PG internals, pooler, host.
  #     providers_default:
  #       core: pgscv         # pgscv (self-managed and YC MDB via remote scrape)
  #       pooler: yc_native   # yc_native (YC pooler) | pgbouncer (self-managed via pgSCV)
  #       host: yc_native     # yc_native (YC host)   | pgscv_system (self-managed system collector)
  #
  #     # Label-selector templates per provider — Go templates over a target's
  #     # vars: {{.Env}} (discovery label, e.g. folder), {{.Cluster}}/{{.Service}}
  #     # (cluster name — most YC MDB + pgscv schemes key by name), {{.ServiceID}}
  #     # (MDB cluster UUID, for schemes keyed by id), {{.Host}} (FQDN), {{.Container}}
  #     # (short host). The defaults below already use the name, so a YC MDB + pgscv
  #     # setup typically needs NO selectors override; set them only to match a
  #     # different label scheme (e.g. resource_id="{{.ServiceID}}" if you key by UUID).
  #     # selectors:
  #     #   pgscv:            'cluster="{{.Env}}",service_id="{{.Service}}",container="{{.Container}}"'
  #     #   yc_native_host:   'cluster="{{.Env}}",resource_id="{{.Service}}"'
  #     #   yc_native_pooler: 'cluster="{{.Env}}",subcluster_name="{{.Service}}"'
  #     #   pgbouncer:        'cluster="{{.Env}}",service_id="{{.Service}}",container="{{.Container}}"'
  #     #   pgscv_system:     'cluster="{{.Env}}",service_id="{{.Service}}",container="{{.Container}}"'
  #
  #     # Map each Dasha (cluster, instance) onto the datasource label values.
  #     targets:
  #       - cluster: my-cluster        # Dasha cluster name
  #         instance: pg-host          # Dasha instance (host)
  #         env: prod                  # -> cluster label
  #         service: my-cluster        # -> service_id / resource_id / subcluster_name
  #         host: pg-host.example.com  # -> host label (full FQDN, join key)
  #         container: pg-host         # -> container label (pgSCV short FQDN)
  #         # providers:               # optional per-target provider override
  #         #   core: pgscv
  #
  #     # Service discovery: clusters found via `discovery:` (e.g. Yandex MDB) are
  #     # auto-mapped from their discovery metadata, so you can OMIT them from
  #     # targets[] above. Host FQDN -> {{.Host}}, cluster name -> {{.Cluster}}/{{.Service}},
  #     # cloud resource id (MDB cluster id) -> {{.ServiceID}}, folder label -> {{.Env}},
  #     # short host -> {{.Container}}; providers come from providers_default (e.g. core: pgscv, pooler/host:
  #     # yc_native). A static targets[] entry always overrides the derived one.
  #     # auto_map_discovered: true       # set false to require explicit targets[]
  #     # discovery_env_label: folder_id  # discovery label feeding {{.Env}}.
  #     #   Built-in labels per discovered cluster: folder_id (cloud folder UUID)
  #     #   and folder (the `discovery:` map key, e.g. dev/uat/prod). Set this to
  #     #   `folder` when your metrics carry cluster="<env>" matching that key.
  #
  #     # Tuning (optional; sensible defaults shown):
  #     # baseline: { window: 672h, min_history: 336h }  # seasonal baseline window / min history
  #     # dips:     { score_points: 10, latency_factor: 2.0 }
  #     # floor:    { wraparound_left: 200000000 }        # xacts-left below this -> critical
  #
  #     # Role connection saturation (yc_native pooler provider): scores the worst
  #     # per-role sessions/conn_limit ratio. Drop service roles so a busy exporter
  #     # or migrator does not inflate the score. role_label is the series label
  #     # carrying the role name; exclude_roles replaces the default and is matched
  #     # against it with a negative regex.
  #     # role_label: query_type
  #     # exclude_roles: [postgres_exporter, migrator]
  #
  #   ## Self-managed example (VictoriaMetrics + pgSCV + pgbouncer):
  #   # metrics:
  #   #   enabled: true
  #   #   datasource: { url: "http://victoria-metrics:8428" }
  #   #   providers_default: { core: pgscv, pooler: pgbouncer, host: pgscv_system }
  #   #   selectors:
  #   #     pgscv:        'host="{{.Host}}",job="pgscv"'
  #   #     pgbouncer:    'service_id="pgbouncer:6432",job="pgscv"'
  #   #     pgscv_system: 'service_id="system:0",job="pgscv"'
  #   #   targets:
  #   #     - { cluster: my-cluster, instance: pg-host, env: prod, service: pg-host, host: pg-host, container: pg-host }

# -- Secrets for environment variables (passwords, etc.)
# Option A: provide existing Secret name containing all password env vars
# Option B: create ExternalSecret via ESO
esoVersion: v1beta1
secrets:
  existingSecret: ""
  externalSecret:
    enabled: false
    refreshInterval: "1m"
    secretStoreRef:
      name: ""
      kind: ClusterSecretStore
    data: []
    #  - secretKey: CLUSTER_MY_CLUSTER_PASSWORD
    #    remoteRef:
    #      key: ycloud/my-cluster
    #      property: password_monitoring_user
    #  - secretKey: DISCOVERY_PROD_PASSWORD
    #    remoteRef:
    #      key: ycloud/monitoring
    #      property: password_monitoring
    #  # Auth secrets (for mode: token or oidc)
    #  - secretKey: DASHA_TOKEN_MONITORING
    #    remoteRef:
    #      key: dasha/auth
    #      property: token_monitoring
    #  - secretKey: DASHA_OIDC_SECRET
    #    remoteRef:
    #      key: dasha/auth
    #      property: oidc_client_secret
    #  - secretKey: DASHA_COOKIE_SECRET
    #    remoteRef:
    #      key: dasha/auth
    #      property: cookie_secret
    #  # Health Score metrics datasource auth (token_from_env / password_from_env)
    #  - secretKey: DASHA_METRICS_DATASOURCE_TOKEN
    #    remoteRef:
    #      key: dasha/metrics
    #      property: datasource_token
    #  # Snapshot storage DSNs (service role for DML, migration role for DDL)
    #  - secretKey: DASHA_STORAGE_DSN
    #    remoteRef:
    #      key: dasha/storage
    #      property: dsn_service
    #  - secretKey: DASHA_STORAGE_DSN_MIGRATION
    #    remoteRef:
    #      key: dasha/storage
    #      property: dsn_migration

# -- Cloud SA keys for service discovery (one per folder/provider)
# Each entry creates a volume mount with authorized_key.json
cloudSAKeys: []
#  - name: prod
#    # Path where authorized_key.json will be mounted
#    mountPath: /secrets/prod
#    # Option A: existing Secret (must contain key "authorized_key.json")
#    existingSecret: ""
#    # Option B: create ExternalSecret via ESO
#    externalSecret:
#      enabled: false
#      refreshInterval: 1m
#      secretStoreRef:
#        name: ""
#        kind: ClusterSecretStore
#      remoteRef:
#        key: ycloud/monitoring
