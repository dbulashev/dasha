imagePullSecrets: []

frontend:
  enabled: true
  replicaCount: 1
  port: 3000
  resources: {}
  # nginx official image runs as UID/GID 101
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
  nodeSelector: {}
  tolerations: []
  affinity: {}

backend:
  port: 8000
  resources: {}
  terminationGracePeriodSeconds: 30
  # -- Extra volumes to attach to the backend pod, i.e. for keycloak or pg certs
  extraVolumes: []
  #  - name: certs
  #    secret:
  #      secretName: pg-client-certs
  # -- Extra volumeMounts for the backend container
  extraVolumeMounts: []
  #  - name: certs
  #    mountPath: /etc/ssl/pg
  #    readOnly: true

# -- Auto-snapshot daemon ("dasha autosnapshot")
# Separate Deployment running the same image with a different entrypoint.
# Runs a single instance by default. For HA (replicaCount>=2) you MUST enable
# advisory-lock leader election by setting `storage.leader_election: true` in the
# config, otherwise every replica runs independently and takes duplicate snapshots.
# Leader election is off by default (incompatible with transaction-pooling proxies).
autosnapshot:
  enabled: false
  replicaCount: 1
  resources: {}
  terminationGracePeriodSeconds: 30
  extraVolumes: []
  extraVolumeMounts: []

# -- MCP connector (dasha-mcp): optional read-only MCP server over the Dasha API
# for AI assistants. Runs in HTTP/SSE mode with per-user token passthrough — each
# client sends its own personal access token in the Authorization header, so the
# user's RBAC is preserved and there is no shared server token by default.
mcp:
  enabled: false
  replicaCount: 1
  port: 8765
  # -- Dasha API base URL the server calls. Empty = in-cluster backend Service.
  dashaUrl: ""
  # -- Per-request timeout for outbound Dasha API calls (Go duration).
  timeout: 30s
  # -- Optional shared fallback token (DASHA_MCP_TOKEN) for clients that cannot
  # send per-request auth headers. Leave unset to keep strict per-user passthrough.
  token:
    existingSecret: ""
    secretKey: token
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # To expose the MCP endpoint outside the cluster, front this Service with your
  # own Ingress/Gateway (TLS terminated there). The pod speaks plain HTTP/SSE.

service:
  type: ClusterIP

ingress:
  enabled: false
  className: ""
  annotations: {}
  domain: dasha.example.com
  tls:
    enabled: false
    secretName: ""
    # Namespace where the cert-manager Certificate is created.
    # Useful when the ingress controller lives in a separate namespace (e.g. Istio)
    # and reads TLS secrets from its own namespace. Empty = release namespace.
    certNamespace: ""
    # Auto-add nginx-ingress ssl-redirect annotations when tls is enabled.
    # Set to false if you want to serve plain HTTP alongside HTTPS.
    redirect: true
    # cert-manager integration
    certManager:
      enabled: false
      issuer: cluster-issuer

# -- Kubernetes Gateway API (gateway.networking.k8s.io/v1)
# Portable alternative to Ingress. Mutually exclusive with ingress.enabled.
gatewayAPI:
  enabled: false
  # gatewayClassName: istio | nginx | envoy | cilium | ...
  gatewayClassName: istio
  hostname: dasha.example.com
  # Namespace for the Gateway resource. Empty = release namespace.
  # Some implementations (e.g. Istio) expect the Gateway in the same namespace as the controller (istio-system).
  gatewayNamespace: ""
  # AllowedRoutes for cross-namespace HTTPRoute attachment.
  allowedRoutes:
    namespaces:
      from: Same  # Same | Selector | All
  tls:
    enabled: false
    certificateRef:
      kind: Secret
      # name: defaults to {fullname}-tls
      name: ""
    certManager:
      enabled: false
      issuer: cluster-issuer
    # Auto-create an HTTPRoute with RequestRedirect filter on the HTTP listener.
    redirect: true

nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""

podAnnotations: {}
# Pod-level securityContext (applied to backend pod by default; frontend overrides via .frontend.podSecurityContext)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
# Container-level securityContext (applied to both backend and frontend containers)
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
nodeSelector: {}
tolerations: []
affinity: {}
