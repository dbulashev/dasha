services:
  backend:
    image: dbulashev/dasha-backend:latest
    restart: unless-stopped
    volumes:
      - ./dasha.yaml:/etc/dasha/dasha.yaml:ro
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: dbulashev/dasha-frontend:latest
    restart: unless-stopped
    environment:
      - BACKEND_URL=backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Auto-snapshot daemon. Runs the same image with "autosnapshot" arg.
  # Single instance by default; to scale, enable storage.leader_election in dasha.yaml.
  autosnapshot:
    image: dbulashev/dasha-backend:latest
    restart: unless-stopped
    command: ["autosnapshot"]
    volumes:
      - ./dasha.yaml:/etc/dasha/dasha.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
