<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Authentication unavailable — Dasha</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #fafafa;
    color: rgba(0, 0, 0, 0.87);
  }
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    max-width: 480px;
  }
  .empty-state img {
    max-width: 240px;
    width: 100%;
    height: auto;
    margin-bottom: 24px;
  }
  .empty-state h1 {
    font-size: 1.25rem;
    font-weight: 400;
    margin: 0 0 8px;
  }
  .empty-state p {
    font-size: 0.875rem;
    color: rgba(0, 0, 0, 0.6);
    line-height: 1.5;
    margin: 0;
  }
</style>
</head>
<body>
  <div class="empty-state">
    <img src="/dasha-appology.png" alt="">
    <h1>Authentication is unavailable</h1>
    <p>{{.Message}}</p>
    {{if .ShowRetry}}<p style="margin-top: 16px;"><a href="/auth/login">Try logging in again</a></p>{{end}}
  </div>
</body>
</html>
